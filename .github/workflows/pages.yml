name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - name: Write Firebase public config
        run: |
          cat > public/firebase-config.json <<'JSON'
          {
            "apiKey": "${{ secrets.VITE_FIREBASE_API_KEY }}",
            "authDomain": "${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}",
            "projectId": "${{ secrets.VITE_FIREBASE_PROJECT_ID }}",
            "storageBucket": "${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}",
            "messagingSenderId": "${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}",
            "appId": "${{ secrets.VITE_FIREBASE_APP_ID }}"
          }
          JSON
      - run: pnpm build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_ADMIN_UIDS: ${{ secrets.VITE_ADMIN_UIDS }}
          VITE_FOOTBALL_API_URL: ${{ secrets.VITE_FOOTBALL_API_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
