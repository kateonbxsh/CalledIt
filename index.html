<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111417" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Called It" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon-192.png" />
    <title>Called it</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #edf0e8;
      }
      .app-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #121417;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .app-loading__box {
        display: grid;
        place-items: center;
        gap: 14px;
      }
      .app-loading__logo {
        width: 92px;
        height: 92px;
        border-radius: 24px;
        box-shadow: 0 22px 44px rgba(18, 20, 23, 0.14);
      }
      .app-loading__text {
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading__box">
          <img class="app-loading__logo" src="./pwa-icon.svg" alt="" />
          <div class="app-loading__text">Called it</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
