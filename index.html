<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111417" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Called It" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon-192.png" />
    <title>Called it</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #edf0e8;
      }
      .app-loading {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #121417;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.82), transparent 34%),
          #edf0e8;
      }
      .app-loading__box {
        display: grid;
        place-items: center;
        gap: 16px;
      }
      .app-loading__logo {
        width: 104px;
        height: 104px;
        border-radius: 28px;
        box-shadow: 0 24px 50px rgba(18, 20, 23, 0.16);
        animation: app-loading-float 1.2s ease-in-out infinite alternate;
      }
      .app-loading__text {
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0;
      }
      .app-loading__bar {
        width: 112px;
        height: 5px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(18, 20, 23, 0.08);
      }
      .app-loading__bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: #2f7d63;
        animation: app-loading-slide 1s ease-in-out infinite;
      }
      @keyframes app-loading-float {
        from { transform: translateY(0) scale(1); }
        to { transform: translateY(-4px) scale(1.015); }
      }
      @keyframes app-loading-slide {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(250%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading__box">
          <img class="app-loading__logo" src="./pwa-icon.svg" alt="" />
          <div class="app-loading__text">Called it</div>
          <div class="app-loading__bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
