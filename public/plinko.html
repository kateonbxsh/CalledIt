<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Plinko Drop</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101927;
      --panel: #172337;
      --board: #142033;
      --line: rgba(255,255,255,0.11);
      --text: #f8fafc;
      --muted: rgba(248,250,252,0.55);
      --sky: #3b75af;
      --plum: #7b5aa6;
      --coral: #d95f46;
      --citrus: #d49a25;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; overflow-x: hidden; max-width: 100%; }
    body {
      background: var(--bg); color: var(--text); overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column; height: 100dvh;
    }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: calc(env(safe-area-inset-top) + 12px) 16px 8px; }
    .topbar h1 { margin: 0; font-size: 20px; font-weight: 900; letter-spacing: -0.01em; }
    .topbar .kicker { font-size: 10px; font-weight: 900; text-transform: uppercase; color: var(--muted); letter-spacing: 0.08em; }
    .balance { display: flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: rgba(255,255,255,0.08); border-radius: 12px; padding: 8px 12px; font-weight: 900; }
    .coin { width: 14px; height: 14px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #ffe39a, #d49a25); display: inline-block; }

    .stage {
      flex: 1; min-height: 0; display: grid; gap: 8px; padding: 0 8px calc(env(safe-area-inset-bottom) + 8px);
      grid-template-rows: minmax(0,1fr) auto;
    }
    @media (min-width: 1024px) {
      .stage { grid-template-columns: 300px minmax(0,1fr); grid-template-rows: 1fr; max-width: 1100px; margin: 0 auto; width: 100%; }
      .controls { order: 1; } .boardwrap { order: 2; }
    }

    .boardwrap { position: relative; min-width: 0; min-height: 0; background: var(--board); border: 1px solid var(--line); border-radius: 18px; padding: 6px; }
    @media (min-width: 1024px) { .boardwrap { border-radius: 22px; padding: 10px; } }
    canvas { position: absolute; inset: 6px; width: calc(100% - 12px); height: calc(100% - 12px); }
    @media (min-width: 1024px) { canvas { inset: 10px; width: calc(100% - 20px); height: calc(100% - 20px); } }

    .controls { display: flex; flex-direction: column; gap: 8px; min-width: 0; background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 10px; box-shadow: 0 -8px 24px rgba(0,0,0,0.25); }
    @media (min-width: 1024px) { .controls { gap: 12px; padding: 14px; box-shadow: none; } }
    .controls > * { min-width: 0; max-width: 100%; }
    .stake-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: stretch; }
    .stake-row > * { min-width: 0; }
    @media (min-width: 1024px) { .stake-row { display: block; } }
    .stake-box { display: flex; align-items: center; gap: 8px; background: #fff; color: #121417; border-radius: 12px; padding: 6px 8px; }
    .stake-box button { width: 34px; height: 34px; border: none; border-radius: 9px; background: #eef0ea; color: #121417; font-size: 18px; font-weight: 900; cursor: pointer; }
    .stake-box input { flex: 1; min-width: 0; width: 100%; border: none; outline: none; text-align: center; font-size: 16px; font-weight: 900; background: transparent; color: #121417; }
    .drop { border: none; border-radius: 12px; padding: 0 22px; font-size: 16px; font-weight: 900; color: #fff; cursor: pointer; background: linear-gradient(135deg, var(--plum), var(--sky)); box-shadow: 0 8px 22px rgba(0,0,0,0.35); }
    @media (min-width: 1024px) { .drop { width: 100%; padding: 13px; margin-top: 10px; } }
    .drop:active { transform: scale(.97); } .drop:disabled { opacity: .45; cursor: not-allowed; }
    .presets { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; max-width: 100%; }
    .preset { flex: none; border: 1px solid var(--line); background: rgba(255,255,255,0.08); color: var(--muted); border-radius: 9px; padding: 7px 10px; font-size: 12px; font-weight: 900; cursor: pointer; }
    .preset.active { border-color: var(--sky); background: var(--sky); color: #fff; }
    .preset:disabled { opacity: .4; }

    .hist-head { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 800; color: var(--muted); }
    .falling { color: var(--citrus); }
    .hist { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; max-width: 100%; }
    @media (min-width: 1024px) { .hist { display: grid; grid-template-columns: 1fr; gap: 6px; max-height: 320px; overflow-y: auto; overflow-x: hidden; } }
    .row { flex: none; display: flex; align-items: center; justify-content: space-between; gap: 8px; background: rgba(255,255,255,0.08); border-radius: 9px; padding: 7px 10px; font-size: 12px; }
    .row .mult { font-weight: 900; }
    .row .net.pos { color: #67c39a; } .row .net.neg { color: var(--coral); }
    .elo { font-size: 10px; font-weight: 900; border-radius: 5px; padding: 1px 5px; }
    .elo.up { background: rgba(47,125,99,0.25); color: #67c39a; }
    .elo.down { background: rgba(217,95,70,0.25); color: var(--coral); }
    .muted-pill { background: rgba(255,255,255,0.08); border-radius: 9px; padding: 7px 10px; font-size: 12px; font-weight: 700; color: var(--muted); }
  </style>
</head>
<body>
  <div class="topbar">
    <div><div class="kicker">Arcade</div><h1>Plinko Drop</h1></div>
    <div class="balance"><span class="coin"></span><span id="balance">1000</span></div>
  </div>

  <div class="stage">
    <div class="boardwrap"><canvas id="board"></canvas></div>
    <div class="controls">
      <div class="stake-row">
        <div class="stake-box">
          <button type="button" id="minus">−</button>
          <input id="stake" type="number" inputmode="numeric" value="50" min="1" />
          <button type="button" id="plus">+</button>
        </div>
        <button class="drop" id="drop">Drop</button>
      </div>
      <div class="presets" id="presets"></div>
      <div>
        <div class="hist-head"><span>History</span><span id="falling"></span></div>
        <div class="hist" id="hist"><span class="muted-pill">No drops yet</span></div>
      </div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  // ---- config ----
  const ROWS = 16;
  const BUCKETS = ROWS + 1;
  const MULTIPLIERS = [14, 7, 3, 1.6, 1, 0.6, 0.4, 0.3, 0.2, 0.3, 0.4, 0.6, 1, 1.6, 3, 7, 14];
  const PRESETS = [10, 50, 100, 250, 500];

  // Fixed virtual board: the whole simulation runs in these units and is scaled to
  // fit any screen, so the pyramid shape and ball physics are identical everywhere.
  const VW = 500, VH = 820;
  const GRAVITY = 2600, RESTITUTION = 0.32, SUBSTEPS = 4;
  const CENTER_PULL = 3.0, HDRAG = 1.1;
  const FIRST_ROW = 3;

  // ---- virtual layout (computed once) ----
  const pegGap = VW / (ROWS + 1);
  const yTop = VH * 0.06;
  const bottomPegY = VH * 0.82;
  const visibleRows = ROWS - FIRST_ROW;
  const rowGap = (bottomPegY - yTop) / (visibleRows - 1);
  const ballR = pegGap * 0.18;
  const pegR = pegGap * 0.14;
  const firstPegY = yTop;
  const dividerTopY = bottomPegY + rowGap * 0.45;
  const bucketTopY = VH * 0.89;   // compact multiplier band
  const bucketBottom = VH * 0.995;
  const binFloorY = bucketBottom - ballR - 2;
  const pegs = [];
  for (let row = FIRST_ROW; row < ROWS; row++) {
    const y = yTop + (row - FIRST_ROW) * rowGap;
    for (let j = 0; j <= row; j++) pegs.push({ x: VW / 2 + (j - row / 2) * pegGap, y, hit: 0 });
  }
  const dividers = [];
  for (let k = 1; k <= ROWS; k++) dividers.push(k * pegGap);
  const bucketHit = new Array(BUCKETS).fill(0);

  // ---- state ----
  const SAVE = 'plinko_balance';
  let balance = Number(localStorage.getItem(SAVE));
  if (!Number.isFinite(balance) || balance <= 0) balance = 1000;
  let stake = 50, activeDrops = 0, nextId = 1;
  const chips = [];
  let view = { scale: 1, offX: 0, offY: 0, cssW: VW, cssH: VH, dpr: 1 };

  // ---- dom ----
  const $ = (id) => document.getElementById(id);
  const canvas = $('board'), ctx = canvas.getContext('2d');
  const host = canvas.parentElement;
  const balanceEl = $('balance'), stakeEl = $('stake'), dropBtn = $('drop');
  const presetsEl = $('presets'), histEl = $('hist'), fallingEl = $('falling');

  function bucketColor(m) { return m >= 4 ? '#7b5aa6' : m >= 2 ? '#3b75af' : m >= 1 ? '#2f7d63' : 'rgba(255,255,255,0.10)'; }

  const presetEls = PRESETS.map((amount) => {
    const b = document.createElement('button');
    b.className = 'preset'; b.textContent = amount; b.type = 'button';
    b.addEventListener('click', () => { stake = amount; stakeEl.value = amount; syncUI(); });
    presetsEl.appendChild(b);
    return b;
  });

  function syncUI() {
    balanceEl.textContent = Math.round(balance);
    presetEls.forEach((el, i) => { el.disabled = PRESETS[i] > balance; el.classList.toggle('active', stake === PRESETS[i]); });
    dropBtn.disabled = !(stake >= 1 && stake <= balance);
    fallingEl.textContent = activeDrops > 0 ? activeDrops + ' falling…' : '';
    fallingEl.className = activeDrops > 0 ? 'falling' : '';
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cssW = host.clientWidth - 12; // canvas inset
    const cssH = host.clientHeight - 12;
    canvas.width = Math.max(1, Math.floor(cssW * dpr));
    canvas.height = Math.max(1, Math.floor(cssH * dpr));
    const scale = Math.min(cssW / VW, cssH / VH);
    view = { scale, offX: (cssW - VW * scale) / 2, offY: (cssH - VH * scale) / 2, cssW, cssH, dpr };
    draw();
  }

  // ---- physics (virtual units) ----
  function physics(chip, dt) {
    const sub = dt / SUBSTEPS, minDist = ballR + pegR;
    for (let s = 0; s < SUBSTEPS; s++) {
      chip.vy += GRAVITY * sub;
      chip.vx += (VW / 2 - chip.x) * CENTER_PULL * sub;
      chip.vx -= chip.vx * HDRAG * sub;
      chip.x += chip.vx * sub;
      chip.y += chip.vy * sub;
      for (const peg of pegs) {
        if (Math.abs(peg.y - chip.y) > rowGap * 1.3 || Math.abs(peg.x - chip.x) > pegGap * 1.3) continue;
        let dx = chip.x - peg.x, dy = chip.y - peg.y, dist = Math.hypot(dx, dy);
        if (dist >= minDist) continue;
        if (dist === 0) { dx = Math.random() - 0.5; dy = -1; dist = Math.hypot(dx, dy); }
        peg.hit = 1;
        const nx = dx / dist, ny = dy / dist;
        chip.x = peg.x + nx * minDist; chip.y = peg.y + ny * minDist;
        const vdotn = chip.vx * nx + chip.vy * ny;
        if (vdotn < 0) {
          chip.vx -= (1 + RESTITUTION) * vdotn * nx;
          chip.vy -= (1 + RESTITUTION) * vdotn * ny;
          const nudge = (Math.random() - 0.5) * (0.10 * Math.hypot(chip.vx, chip.vy) + 32);
          chip.vx += -ny * nudge; chip.vy += nx * nudge;
        }
      }
      if (chip.x < ballR) { chip.x = ballR; chip.vx = Math.abs(chip.vx) * RESTITUTION; }
      if (chip.x > VW - ballR) { chip.x = VW - ballR; chip.vx = -Math.abs(chip.vx) * RESTITUTION; }
      if (chip.y > dividerTopY) {
        for (const dx of dividers) {
          if (Math.abs(chip.x - dx) < ballR) {
            if (chip.x < dx) { chip.x = dx - ballR; chip.vx = -Math.abs(chip.vx) * RESTITUTION; }
            else { chip.x = dx + ballR; chip.vx = Math.abs(chip.vx) * RESTITUTION; }
          }
        }
      }
    }
  }

  // ---- render ----
  function draw() {
    const { scale, offX, offY, cssW, cssH, dpr } = view;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, cssW, cssH);
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, dpr * offX, dpr * offY);

    // funnel guides between the last pegs and the buckets
    ctx.strokeStyle = 'rgba(255,255,255,0.07)'; ctx.lineWidth = 1;
    for (const dx of dividers) { ctx.beginPath(); ctx.moveTo(dx, dividerTopY); ctx.lineTo(dx, bucketTopY); ctx.stroke(); }

    // compact multiplier band at the bottom
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const bandH = bucketBottom - bucketTopY;
    for (let k = 0; k < BUCKETS; k++) {
      const m = MULTIPLIERS[k];
      const x0 = k * pegGap, w = pegGap;
      const hit = bucketHit[k];
      const lift = hit * 5;
      ctx.fillStyle = bucketColor(m);
      roundRect(x0 + 1, bucketTopY - lift, w - 2, bandH, 6);
      ctx.fill();
      if (hit > 0) { ctx.globalAlpha = hit * 0.5; ctx.fillStyle = '#fff'; roundRect(x0 + 1, bucketTopY - lift, w - 2, bandH, 6); ctx.fill(); ctx.globalAlpha = 1; }
      ctx.fillStyle = m >= 1 ? '#fff' : 'rgba(255,255,255,0.6)';
      ctx.font = `900 ${13 * (1 + hit * 0.25)}px Segoe UI, sans-serif`;
      ctx.fillText(m + 'x', x0 + w / 2, (bucketTopY - lift) + bandH / 2);
    }

    // pegs
    for (const peg of pegs) {
      if (peg.hit > 0) {
        ctx.globalAlpha = peg.hit * 0.30; ctx.fillStyle = '#ffe39a';
        ctx.beginPath(); ctx.arc(peg.x, peg.y, pegR + peg.hit * pegR * 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.fillStyle = peg.hit > 0 ? 'rgba(255,255,255,' + (0.55 + peg.hit * 0.45) + ')' : 'rgba(255,255,255,0.55)';
      ctx.beginPath(); ctx.arc(peg.x, peg.y, pegR + peg.hit * pegR * 0.2, 0, Math.PI * 2); ctx.fill();
    }

    // chips
    for (const chip of chips) {
      for (let i = 0; i < chip.trail.length; i++) {
        const p = chip.trail[i];
        ctx.fillStyle = `rgba(212,154,37,${(i / chip.trail.length) * 0.26})`;
        ctx.beginPath(); ctx.arc(p.x, p.y, ballR * (0.45 + 0.5 * (i / chip.trail.length)), 0, Math.PI * 2); ctx.fill();
      }
      const g = ctx.createRadialGradient(chip.x - ballR * 0.3, chip.y - ballR * 0.3, ballR * 0.2, chip.x, chip.y, ballR);
      g.addColorStop(0, '#ffe39a'); g.addColorStop(1, '#d49a25');
      ctx.beginPath(); ctx.arc(chip.x, chip.y, ballR, 0, Math.PI * 2); ctx.fillStyle = g; ctx.fill();
      ctx.lineWidth = ballR * 0.15; ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.stroke();
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- ELO flair (display only in the standalone) ----
  function eloDelta(m, s) {
    const sf = Math.min(1, s / 200);
    if (m >= 1) {
      const chance = Math.min(0.55, 0.03 * (m - 1) * sf + (m >= 4 ? 0.06 : 0));
      if (Math.random() >= chance) return 0;
      if (m >= 5) return 2 + (Math.random() < 0.4 ? 1 : 0);
      if (m >= 2) return 1 + (Math.random() < 0.3 ? 1 : 0);
      return 1;
    }
    const chance = Math.min(0.18, 0.18 * (1 - m) * sf);
    if (Math.random() >= chance) return 0;
    return m <= 0.2 && s >= 100 ? -2 : -1;
  }

  function settle(chip, bin) {
    const m = MULTIPLIERS[bin] ?? 0;
    const payout = Math.round(chip.stake * m);
    const net = payout - chip.stake;
    const elo = eloDelta(m, chip.stake);
    balance = Math.max(0, balance + payout);
    localStorage.setItem(SAVE, String(Math.round(balance)));
    activeDrops = Math.max(0, activeDrops - 1);
    bucketHit[bin] = 1;
    addHistory(m, net, elo);
    syncUI();
  }

  function addHistory(m, net, elo) {
    const first = histEl.firstChild;
    if (first && first.classList && first.classList.contains('muted-pill')) histEl.innerHTML = '';
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `<span class="mult" style="color:${m >= 1 ? '#67c39a' : 'rgba(255,255,255,0.45)'}">${m}x</span>`
      + `<span style="display:flex;align-items:center;gap:6px">`
      + `<span class="net ${net >= 0 ? 'pos' : 'neg'}">${net >= 0 ? '+' : ''}${net}</span>`
      + (elo ? `<span class="elo ${elo > 0 ? 'up' : 'down'}">${elo > 0 ? '+' : ''}${elo} ELO</span>` : '')
      + `</span>`;
    histEl.insertBefore(row, histEl.firstChild);
    while (histEl.children.length > 12) histEl.removeChild(histEl.lastChild);
  }

  // ---- loop ----
  let raf = null, last = performance.now();
  function step(now) {
    let dt = (now - last) / 1000; last = now; if (dt > 0.04) dt = 0.04;
    for (const chip of chips) {
      if (chip.landed) continue;
      physics(chip, dt);
      chip.trail.push({ x: chip.x, y: chip.y });
      if (chip.trail.length > 8) chip.trail.shift();
      if (chip.y + ballR >= binFloorY) {
        chip.y = binFloorY - ballR; chip.landed = true; chip.removeAt = now + 280;
        settle(chip, Math.max(0, Math.min(ROWS, Math.floor(chip.x / pegGap))));
      }
    }
    for (let i = chips.length - 1; i >= 0; i--) if (chips[i].landed && now >= chips[i].removeAt) chips.splice(i, 1);
    let busy = chips.length > 0;
    for (const peg of pegs) if (peg.hit > 0) { peg.hit = Math.max(0, peg.hit - dt * 3.2); if (peg.hit > 0) busy = true; }
    for (let k = 0; k < BUCKETS; k++) if (bucketHit[k] > 0) { bucketHit[k] = Math.max(0, bucketHit[k] - dt * 3); if (bucketHit[k] > 0) busy = true; }
    draw();
    raf = busy ? requestAnimationFrame(step) : null;
  }
  function startLoop() { if (raf === null) { last = performance.now(); raf = requestAnimationFrame(step); } }

  function dropChip() {
    if (!(stake >= 1 && stake <= balance)) return;
    balance = Math.max(0, balance - stake);
    localStorage.setItem(SAVE, String(Math.round(balance)));
    activeDrops++;
    chips.push({
      id: nextId++, stake,
      x: VW / 2 + (Math.random() - 0.5) * pegGap * 0.6,
      y: firstPegY - rowGap * 0.8, vx: (Math.random() - 0.5) * 40, vy: 0,
      trail: [], landed: false, removeAt: 0,
    });
    syncUI();
    startLoop();
  }

  // ---- input ----
  dropBtn.addEventListener('click', dropChip);
  $('minus').addEventListener('click', () => { stake = Math.max(1, stake - 10); stakeEl.value = stake; syncUI(); });
  $('plus').addEventListener('click', () => { stake = Math.min(Math.floor(balance) || 1, stake + 10); stakeEl.value = stake; syncUI(); });
  stakeEl.addEventListener('input', () => { const v = Math.round(Number(stakeEl.value)); stake = Number.isFinite(v) ? Math.max(1, v) : 1; syncUI(); });
  stakeEl.addEventListener('blur', () => { stakeEl.value = stake; });

  new ResizeObserver(resize).observe(host);
  resize();
  syncUI();
})();
</script>
</body>
</html>
